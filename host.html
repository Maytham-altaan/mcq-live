<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Host Dashboard — Live Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1f262f;
    --line: #2a313c;
    --ink: #e6edf3;
    --mute: #8b949e;
    --accent: #f0a830;
    --accent-2: #58a6ff;
    --good: #3fb950;
    --bad: #f85149;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    padding: 24px 20px 60px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); font-style: italic; }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--mute);
    text-align: right;
  }
  .meta .live {
    color: var(--good);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .nav-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .nav-controls button {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  .nav-controls button:hover { border-color: var(--accent); }
  .nav-controls button.active {
    background: var(--accent);
    color: #1a1a1a;
    border-color: var(--accent);
  }
  .nav-controls .divider {
    width: 1px;
    height: 24px;
    background: var(--line);
    margin: 0 4px;
  }
  .nav-controls .overview-btn {
    background: var(--accent-2);
    color: #0e1116;
    border-color: var(--accent-2);
    font-weight: 600;
  }
  .nav-controls .overview-btn.active {
    background: var(--good);
    border-color: var(--good);
  }

  .question-display {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .qmeta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .qtext {
    font-size: 24px;
    line-height: 1.35;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .total {
    font-family: 'JetBrains Mono', monospace;
    color: var(--mute);
    font-size: 14px;
  }
  .total b { color: var(--accent); font-size: 22px; font-family: 'Fraunces', serif; }

  .reveal-btn {
    background: var(--accent-2);
    color: #0e1116;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .reveal-btn.revealed { background: var(--good); }

  .bars { display: flex; flex-direction: column; gap: 12px; }
  .bar-row {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.3s;
  }
  .bar-row.correct {
    border-color: var(--good);
    background: rgba(63, 185, 80, 0.06);
  }
  .bar-row.incorrect {
    border-color: var(--bad);
    opacity: 0.7;
  }
  .bar-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 16px;
    gap: 16px;
  }
  .bar-head > div:first-child { flex: 1; }
  .bar-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    margin-right: 10px;
  }
  .bar-row.correct .bar-letter { color: var(--good); }
  .bar-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--mute);
    white-space: nowrap;
  }
  .bar-track {
    background: var(--panel-2);
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.5s ease;
  }
  .bar-row.correct .bar-fill { background: var(--good); }
  .bar-row.incorrect .bar-fill { background: var(--bad); }

  .responders {
    margin-top: 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
  }
  .responders h3 {
    margin: 0 0 12px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .resp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .resp-pill {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .resp-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resp-ans {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    font-size: 12px;
  }
  .resp-pill.revealed.correct .resp-ans { color: var(--good); }
  .resp-pill.revealed.incorrect .resp-ans { color: var(--bad); }

  /* Overview mode — compact card per question */
  .overview-grid { display: flex; flex-direction: column; gap: 16px; }
  .ov-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
  }
  .ov-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .ov-qid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .ov-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--mute);
  }
  .ov-q {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.35;
  }
  .ov-bars { display: flex; flex-direction: column; gap: 6px; }
  .ov-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .ov-bar .L {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    width: 18px;
  }
  .ov-bar .text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ov-bar .track {
    width: 120px;
    background: var(--panel-2);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  .ov-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s ease;
  }
  .ov-bar.correct .L { color: var(--good); }
  .ov-bar.correct .fill { background: var(--good); }
  .ov-bar .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--mute);
    width: 60px;
    text-align: right;
  }

  .config {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .config label { color: var(--mute); display: block; margin-bottom: 4px; }
  .config input {
    width: 100%;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Live <span>Stats</span></h1>
    <div class="meta">
      <div class="live"><span class="live-dot"></span> POLLING EVERY 3s</div>
      <div id="sessionMeta">—</div>
    </div>
  </header>

  <div class="config" id="configBox" style="display:none;">
    <label>API URL not set — paste your /exec URL:</label>
    <input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec" />
  </div>

  <div class="nav-controls" id="navControls">
    <button class="overview-btn" data-mode="overview" onclick="switchMode('overview')">Overview · all Qs</button>
    <span class="divider"></span>
  </div>

  <div id="singleView">
    <div class="question-display">
      <div class="qmeta" id="qMeta">Loading…</div>
      <div class="qtext" id="qText"></div>
      <div class="stats-bar">
        <div class="total"><b id="totalCount">0</b> response(s)</div>
        <button class="reveal-btn" id="revealBtn" onclick="toggleReveal()">Reveal answer</button>
      </div>
      <div class="bars" id="bars"></div>
    </div>

    <div class="responders">
      <h3>Responders</h3>
      <div class="resp-grid" id="respGrid"><span style="color:var(--mute);font-size:13px;">No answers yet.</span></div>
    </div>
  </div>

  <div id="overviewView" style="display:none;">
    <div class="overview-grid" id="ovGrid">
      <div style="color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;padding:40px;">Loading overview…</div>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const sessionId = params.get('s');
  let mode = params.get('mode') || 'single';   // 'single' | 'overview'
  let currentQId = params.get('q') || 'Q1';
  let revealed = false;
  let revealedAll = false;  // For overview mode
  let API_URL = localStorage.getItem('mcq_api') || '';
  let questionList = [];    // Discovered from getAllStats

  if (!API_URL) {
    document.getElementById('configBox').style.display = 'block';
    document.getElementById('apiUrl').addEventListener('change', e => {
      API_URL = e.target.value.trim();
      localStorage.setItem('mcq_api', API_URL);
      document.getElementById('configBox').style.display = 'none';
      tick();
    });
  }

  if (!sessionId) {
    document.body.innerHTML = '<div class="container"><h1>Missing session ID.</h1><p style="color:var(--mute);font-family:JetBrains Mono,monospace;font-size:13px;">Open this page with <code>?s=YOUR_SESSION_ID</code> appended to the URL.</p></div>';
  }

  document.getElementById('sessionMeta').textContent = `SESSION ${sessionId}`;

  // ---------- iPhone-safe fetch ----------
  async function apiCall(action, extraParams) {
    const qs = new URLSearchParams({ action: action, _: Date.now() });
    if (extraParams) {
      Object.keys(extraParams).forEach(k => {
        if (extraParams[k] != null) qs.append(k, extraParams[k]);
      });
    }
    const url = API_URL + (API_URL.indexOf('?') === -1 ? '?' : '&') + qs.toString();
    const r = await fetch(url, { method: 'GET', cache: 'no-store', redirect: 'follow' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  }

  // ---------- Mode + nav ----------

  function switchMode(newMode) {
    mode = newMode;
    document.getElementById('singleView').style.display = (mode === 'single') ? '' : 'none';
    document.getElementById('overviewView').style.display = (mode === 'overview') ? '' : 'none';
    history.replaceState(null, '', `?s=${sessionId}&mode=${mode}${mode === 'single' ? '&q=' + currentQId : ''}`);
    highlightActive();
    tick();
  }

  function switchQ(qid) {
    currentQId = qid;
    revealed = false;
    document.getElementById('revealBtn').textContent = 'Reveal answer';
    document.getElementById('revealBtn').classList.remove('revealed');
    mode = 'single';
    document.getElementById('singleView').style.display = '';
    document.getElementById('overviewView').style.display = 'none';
    history.replaceState(null, '', `?s=${sessionId}&mode=single&q=${qid}`);
    highlightActive();
    tick();
  }

  function rebuildNavButtons() {
    const nav = document.getElementById('navControls');
    // Remove old Q buttons (keep overview button + divider)
    [...nav.querySelectorAll('button[data-qid]')].forEach(b => b.remove());
    questionList.forEach(qid => {
      const b = document.createElement('button');
      b.textContent = qid;
      b.dataset.qid = qid;
      b.onclick = () => switchQ(qid);
      nav.appendChild(b);
    });
    highlightActive();
  }

  function highlightActive() {
    const nav = document.getElementById('navControls');
    nav.querySelectorAll('button').forEach(b => {
      if (b.dataset.mode === 'overview') {
        b.classList.toggle('active', mode === 'overview');
      } else if (b.dataset.qid) {
        b.classList.toggle('active', mode === 'single' && b.dataset.qid === currentQId);
      }
    });
  }

  function toggleReveal() {
    revealed = !revealed;
    const btn = document.getElementById('revealBtn');
    btn.textContent = revealed ? 'Hide answer' : 'Reveal answer';
    btn.classList.toggle('revealed', revealed);
    if (lastSingleData) renderSingle(lastSingleData);
  }

  // ---------- Tick (poll loop) ----------

  let lastSingleData = null;
  let lastAllData = null;

  async function tick() {
    if (!API_URL) return;
    try {
      // Always fetch all stats — gives us the question list and supports both modes
      const all = await apiCall('getAllStats', { sessionId: sessionId });
      if (!all.ok) return;
      lastAllData = all;

      // Update question list / nav buttons if changed
      if (JSON.stringify(all.order) !== JSON.stringify(questionList)) {
        questionList = all.order;
        rebuildNavButtons();
      }

      if (mode === 'single') {
        const q = all.byQuestion[currentQId];
        if (q) {
          lastSingleData = {
            total: q.total,
            counts: q.counts,
            responders: q.responders,
            questionInfo: { question: q.question, options: q.options, correct: q.correct }
          };
          renderSingle(lastSingleData);
        }
      } else {
        renderOverview(all);
      }
    } catch (e) {
      // silent — keep retrying
    }
  }

  // ---------- Render: single ----------

  function renderSingle(d) {
    if (!d || !d.questionInfo) {
      document.getElementById('qText').textContent = 'Question not found.';
      return;
    }
    document.getElementById('qMeta').textContent = currentQId;
    document.getElementById('qText').textContent = d.questionInfo.question;
    document.getElementById('totalCount').textContent = d.total || 0;

    const letters = ['A','B','C','D','E'];
    const opts = d.questionInfo.options;
    const counts = d.counts || {};
    const total = d.total || 0;
    const correct = d.questionInfo.correct;

    const bars = document.getElementById('bars');
    bars.innerHTML = '';
    opts.forEach((opt, i) => {
      const L = letters[i];
      const c = counts[L] || 0;
      const pct = total > 0 ? Math.round((c / total) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'bar-row';
      if (revealed) {
        row.classList.add(L === correct ? 'correct' : 'incorrect');
      }
      row.innerHTML = `
        <div class="bar-head">
          <div><span class="bar-letter">${L}</span>${escapeHtml(opt)}</div>
          <div class="bar-count">${c} · ${pct}%</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
      `;
      bars.appendChild(row);
    });

    const grid = document.getElementById('respGrid');
    if (!d.responders || d.responders.length === 0) {
      grid.innerHTML = '<span style="color:var(--mute);font-size:13px;">No answers yet.</span>';
    } else {
      grid.innerHTML = '';
      d.responders.forEach(r => {
        const div = document.createElement('div');
        div.className = 'resp-pill';
        if (revealed) {
          div.classList.add('revealed', r.answer === correct ? 'correct' : 'incorrect');
        }
        div.innerHTML = `<span class="resp-name">${escapeHtml(r.name)}</span><span class="resp-ans">${escapeHtml(r.answer)}</span>`;
        grid.appendChild(div);
      });
    }
  }

  // ---------- Render: overview ----------

  function renderOverview(all) {
    const grid = document.getElementById('ovGrid');
    if (!all.order || all.order.length === 0) {
      grid.innerHTML = '<div style="color:var(--mute);font-family:JetBrains Mono,monospace;font-size:13px;text-align:center;padding:40px;">No questions yet.</div>';
      return;
    }
    grid.innerHTML = '';
    const letters = ['A','B','C','D','E'];

    all.order.forEach(qid => {
      const q = all.byQuestion[qid];
      if (!q) return;

      let barsHtml = '';
      q.options.forEach((opt, i) => {
        const L = letters[i];
        const c = q.counts[L] || 0;
        const pct = q.total > 0 ? Math.round((c / q.total) * 100) : 0;
        const isCorrect = L === q.correct;
        barsHtml += `
          <div class="ov-bar ${isCorrect ? 'correct' : ''}">
            <span class="L">${L}</span>
            <span class="text">${escapeHtml(opt)}</span>
            <div class="track"><div class="fill" style="width:${pct}%"></div></div>
            <span class="num">${c} · ${pct}%</span>
          </div>`;
      });

      const card = document.createElement('div');
      card.className = 'ov-card';
      card.innerHTML = `
        <div class="ov-head">
          <span class="ov-qid">${escapeHtml(qid)} · correct: ${escapeHtml(q.correct || '?')}</span>
          <span class="ov-total">${q.total} response(s)</span>
        </div>
        <div class="ov-q">${escapeHtml(q.question)}</div>
        <div class="ov-bars">${barsHtml}</div>
      `;
      grid.appendChild(card);
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Initial paint + poll loop
  tick();
  setInterval(tick, 3000);
</script>
</body>
</html>
