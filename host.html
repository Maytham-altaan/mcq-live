<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"] {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1f262f;
    --line: #2a313c;
    --ink: #e6edf3;
    --mute: #8b949e;
    --accent: #f0a830;
    --good: #3fb950;
    --bad: #f85149;
    --accent-tint: rgba(240, 168, 48, 0.1);
  }
  [data-theme="light"] {
    --bg: #faf8f3;
    --panel: #ffffff;
    --panel-2: #f3efe7;
    --line: #d9d2c4;
    --ink: #1c1a17;
    --mute: #6b6357;
    --accent: #c47a17;
    --good: #1a7f37;
    --bad: #cf222e;
    --accent-tint: rgba(196, 122, 23, 0.12);
  }
  body { transition: background 0.25s, color 0.25s; }
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  .brand {
    font-family: 'JetBrains Mono', monospace;
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .brand span { color: var(--accent); }
  .name-gate, .question-view, .done {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
  }
  h2 {
    font-weight: 600;
    margin: 0 0 16px;
    font-size: 22px;
    line-height: 1.3;
  }
  input.name {
    width: 100%;
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 17px;
    margin-bottom: 16px;
  }
  button.primary {
    width: 100%;
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 600;
    font-family: inherit;
    font-size: 17px;
    cursor: pointer;
  }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .qmeta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .qtext {
    font-size: 19px;
    line-height: 1.45;
    margin-bottom: 20px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--panel-2);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: inherit;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.4;
    width: 100%;
  }
  .opt:hover { border-color: var(--accent); }
  .opt.selected {
    border-color: var(--accent);
    background: var(--accent-tint);
  }
  .opt .letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .err { color: var(--bad); margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .done { text-align: center; }
  .done .check { font-size: 56px; color: var(--good); margin-bottom: 8px; }
  .done h2 { color: var(--good); }
  .loading { color: var(--mute); text-align: center; padding: 40px; }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
<div class="container">
  <div class="brand">live <span>mcq</span> · clinical pharmacy</div>

  <div id="nameGate" class="name-gate">
    <h2>Enter your name to begin</h2>
    <input type="text" class="name" id="nameInput" placeholder="Your name" autocomplete="off" />
    <button class="primary" onclick="startQuiz()">Continue</button>
    <div class="err" id="errGate"></div>
  </div>

  <div id="questionView" class="question-view" style="display:none;">
    <div class="qmeta" id="qMeta">Loading…</div>
    <div class="qtext" id="qText"></div>
    <div class="options" id="options"></div>
    <button class="primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit answer</button>
    <div class="err" id="errQ"></div>
  </div>

  <div id="done" class="done" style="display:none;">
    <div class="check">✓</div>
    <h2>Answer recorded</h2>
    <p style="color:var(--mute);">Wait for the host to reveal results.</p>
  </div>
</div>

<script>
  // Theme toggle
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = t === 'light' ? '☀️' : '🌙';
    localStorage.setItem('mcq_theme', t);
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('mcq_theme') || 'dark');

  // === CONFIG: paste your /exec URL here, OR set via builder localStorage ===
  const API_URL = localStorage.getItem('mcq_api') || '';

  const params = new URLSearchParams(location.search);
  const sessionId = params.get('s');
  const questionId = params.get('q') || 'Q1';

  let studentName = '';
  let selected = null;

  if (!sessionId) {
    document.body.innerHTML = '<div class="container"><div class="name-gate"><h2>Invalid quiz link</h2><p style="color:var(--mute)">Missing session ID.</p></div></div>';
  }
  if (!API_URL) {
    document.body.innerHTML = '<div class="container"><div class="name-gate"><h2>Setup needed</h2><p style="color:var(--mute)">API URL not configured. Open the builder page first to set it.</p></div></div>';
  }

  function startQuiz() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('errGate').textContent = 'Please enter your name.';
      return;
    }
    studentName = name;
    localStorage.setItem('mcq_studentName', name);
    document.getElementById('nameGate').style.display = 'none';
    document.getElementById('questionView').style.display = 'block';
    loadQuestion();
  }

  // pre-fill name if known
  const savedName = localStorage.getItem('mcq_studentName');
  if (savedName) document.getElementById('nameInput').value = savedName;

  async function loadQuestion() {
    const url = `${API_URL}?action=getQuestion&sessionId=${encodeURIComponent(sessionId)}&questionId=${encodeURIComponent(questionId)}`;
    try {
      const r = await fetch(url);
      const d = await r.json();
      if (!d.ok) {
        document.getElementById('qText').textContent = d.error || 'Could not load question.';
        return;
      }
      document.getElementById('qMeta').textContent = `Session ${sessionId} · ${questionId}`;
      document.getElementById('qText').textContent = d.question;
      const optsBox = document.getElementById('options');
      optsBox.innerHTML = '';
      const letters = ['A','B','C','D','E'];
      d.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.dataset.letter = letters[i];
        btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectOption(letters[i], btn);
        optsBox.appendChild(btn);
      });
    } catch (e) {
      document.getElementById('errQ').textContent = 'Network error loading question.';
    }
  }

  function selectOption(letter, btn) {
    selected = letter;
    document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('submitBtn').disabled = false;
  }

  async function submitAnswer() {
    if (!selected) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';
    document.getElementById('errQ').textContent = '';

    const fd = new FormData();
    fd.append('action', 'submitAnswer');
    fd.append('sessionId', sessionId);
    fd.append('questionId', questionId);
    fd.append('studentName', studentName);
    fd.append('answer', selected);

    try {
      const r = await fetch(API_URL, { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok || d.alreadyAnswered) {
        document.getElementById('questionView').style.display = 'none';
        document.getElementById('done').style.display = 'block';
        if (d.alreadyAnswered) {
          document.querySelector('#done h2').textContent = 'Already answered';
        }
      } else {
        document.getElementById('errQ').textContent = d.error || 'Submission failed.';
        btn.disabled = false;
        btn.textContent = 'Submit answer';
      }
    } catch (e) {
      document.getElementById('errQ').textContent = 'Network error: ' + e.message;
      btn.disabled = false;
      btn.textContent = 'Submit answer';
    }
  }
</script>
</body>
</html>
