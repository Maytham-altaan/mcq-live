<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live MCQ — Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root, [data-theme="dark"] {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1f262f;
    --line: #2a313c;
    --ink: #e6edf3;
    --mute: #8b949e;
    --accent: #f0a830;
    --accent-2: #58a6ff;
    --good: #3fb950;
    --bad: #f85149;
    --shadow: 0 4px 14px rgba(240, 168, 48, 0.3);
  }
  [data-theme="light"] {
    --bg: #faf8f3;
    --panel: #ffffff;
    --panel-2: #f3efe7;
    --line: #d9d2c4;
    --ink: #1c1a17;
    --mute: #6b6357;
    --accent: #c47a17;
    --accent-2: #1f6feb;
    --good: #1a7f37;
    --bad: #cf222e;
    --shadow: 0 4px 14px rgba(196, 122, 23, 0.25);
  }
  body { transition: background 0.25s, color 0.25s; }
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: scale(1.05); }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  .container { max-width: 880px; margin: 0 auto; }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0;
    line-height: 1.05;
  }
  h1 span { color: var(--accent); font-style: italic; }
  .sub {
    color: var(--mute);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .config {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .config label { display: block; color: var(--mute); margin-bottom: 6px; }
  .config input {
    width: 100%;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
  }
  .quiz-title-input {
    width: 100%;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 18px;
    margin-bottom: 24px;
  }
  .question-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .qhead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .qnum {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
  }
  .btn-icon {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--mute);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-icon:hover { color: var(--bad); border-color: var(--bad); }
  textarea, .opt-input {
    width: 100%;
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 15px;
  }
  textarea { resize: vertical; min-height: 60px; margin-bottom: 12px; }
  .opt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--mute);
    width: 22px;
    text-align: center;
  }
  .opt-row input[type="radio"] {
    accent-color: var(--good);
    width: 18px; height: 18px;
    cursor: pointer;
  }
  .actions {
    display: flex;
    gap: 12px;
    margin: 24px 0;
    flex-wrap: wrap;
  }
  button.primary {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-weight: 600;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  button.primary:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 12px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
  }
  button.secondary:hover { border-color: var(--ink); }
  .result {
    background: var(--panel);
    border: 1px solid var(--good);
    border-radius: 12px;
    padding: 24px;
    margin-top: 24px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result h2 { margin: 0 0 16px; font-weight: 600; }
  .qrbox {
    background: white;
    padding: 16px;
    display: inline-block;
    border-radius: 8px;
    margin: 12px 0;
  }
  .links {
    display: grid;
    gap: 10px;
    margin-top: 16px;
    text-align: left;
  }
  .links a {
    color: var(--accent-2);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    word-break: break-all;
    background: var(--panel-2);
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--line);
    display: block;
  }
  .links a:hover { border-color: var(--accent-2); }
  .links .lbl { color: var(--mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .err { color: var(--bad); margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
<div class="container">

  <header>
    <h1>Live <span>MCQ</span> Builder</h1>
    <div class="sub">// build · share QR · watch answers stream in</div>
  </header>

  <div class="config">
    <label>API endpoint (Apps Script /exec URL)</label>
    <input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec" />
  </div>

  <input type="text" class="quiz-title-input" id="quizTitle" placeholder="Quiz title — e.g. Antibiotic Stewardship Round 1" />

  <div id="questions"></div>

  <div class="actions">
    <button class="secondary" onclick="addQuestion()">+ Add question</button>
    <button class="primary" onclick="createQuiz()">Generate QR & Host link →</button>
  </div>

  <div class="result" id="result">
    <h2>Quiz ready</h2>
    <div class="sub" id="sessionLabel"></div>
    <div class="qrbox"><div id="qrcode"></div></div>
    <div class="links">
      <div>
        <div class="lbl">Student link (encode in QR)</div>
        <a id="studentLink" target="_blank"></a>
      </div>
      <div>
        <div class="lbl">Host dashboard (open this on your screen)</div>
        <a id="hostLink" target="_blank"></a>
      </div>
    </div>
  </div>
  <div class="err" id="err"></div>

</div>

<script>
  // Theme toggle
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeToggle').textContent = t === 'light' ? '☀️' : '🌙';
    localStorage.setItem('mcq_theme', t);
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('mcq_theme') || 'dark');

  // Persist API URL across page loads
  const apiInput = document.getElementById('apiUrl');
  apiInput.value = localStorage.getItem('mcq_api') || '';
  apiInput.addEventListener('change', () => localStorage.setItem('mcq_api', apiInput.value.trim()));

  let qCount = 0;
  function addQuestion() {
    qCount++;
    const idx = qCount;
    const wrap = document.createElement('div');
    wrap.className = 'question-card';
    wrap.dataset.idx = idx;
    wrap.innerHTML = `
      <div class="qhead">
        <span class="qnum">QUESTION ${idx}</span>
        <button class="btn-icon" onclick="this.closest('.question-card').remove()">✕</button>
      </div>
      <textarea placeholder="Question text..." class="qtext"></textarea>
      ${['A','B','C','D','E'].map(L => `
        <div class="opt-row">
          <input type="radio" name="correct-${idx}" value="${L}" ${L==='A'?'checked':''}>
          <span class="opt-letter">${L}</span>
          <input class="opt-input" data-letter="${L}" placeholder="Option ${L}${L==='E'?' (optional)':''}">
        </div>
      `).join('')}
    `;
    document.getElementById('questions').appendChild(wrap);
  }

  // start with one question
  addQuestion();

  async function createQuiz() {
    const errEl = document.getElementById('err');
    errEl.textContent = '';
    const api = apiInput.value.trim();
    if (!api) { errEl.textContent = 'Enter your Apps Script /exec URL first.'; return; }

    const title = document.getElementById('quizTitle').value.trim() || 'Untitled Quiz';
    const cards = document.querySelectorAll('.question-card');
    const payload = [];
    for (const c of cards) {
      const q = c.querySelector('.qtext').value.trim();
      const opts = [...c.querySelectorAll('.opt-input')]
        .map(i => i.value.trim());
      const filled = opts.filter(o => o);
      if (!q || filled.length < 2) {
        errEl.textContent = 'Each question needs text and at least 2 options.';
        return;
      }
      const correctEl = c.querySelector('input[type="radio"]:checked');
      const correct = correctEl ? correctEl.value : 'A';
      payload.push({ q, options: opts, correct });
    }

    const fd = new FormData();
    fd.append('action', 'createSession');
    fd.append('title', title);
    fd.append('payload', JSON.stringify(payload));

    try {
      const res = await fetch(api, { method: 'POST', body: fd });
      const data = await res.json();
      if (!data.ok) { errEl.textContent = data.error || 'Failed to create session.'; return; }

      const baseUrl = location.href.replace(/\/[^\/]*$/, '/');
      const studentUrl = `${baseUrl}quiz.html?s=${data.sessionId}`;
      const hostUrl = `${baseUrl}host.html?s=${data.sessionId}`;

      document.getElementById('sessionLabel').textContent = `Session ${data.sessionId}  ·  ${data.count} question(s)`;
      document.getElementById('studentLink').textContent = studentUrl;
      document.getElementById('studentLink').href = studentUrl;
      document.getElementById('hostLink').textContent = hostUrl;
      document.getElementById('hostLink').href = hostUrl;

      const qr = document.getElementById('qrcode');
      qr.innerHTML = '';
      new QRCode(qr, { text: studentUrl, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });

      document.getElementById('result').classList.add('show');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
      errEl.textContent = 'Network error: ' + e.message;
    }
  }
</script>
</body>
</html>
